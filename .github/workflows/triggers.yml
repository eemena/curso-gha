name: Triggers
on:
    push:
        branches: [main]
    pull_request:
        types: [opened, synchronize, reopened]
jobs:
  triggers:
    runs-on: ubuntu-latest
    steps:
     - name : checkout
       uses: actions/checkout@v3

     - name: install node
       uses: actions/setup-node@v6
             
     - name: run script
       run: npx tsx hola-mundo.ts